- model: ui.view
  ext_id: community_view_event_list
  fields:
    name: "Calendario de Eventos"
    model_key: community_event
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { field: name, label: "Evento", sortable: true }
        - { field: start_at, label: "Fecha y Hora" }
        - { field: current_participants, label: "Inscritos" } # Añadido para ver el aforo real
        - { field: capacity, label: "Aforo Máximo" }
        - { field: is_published, label: "Publicado", type: boolean }
      
      row_actions:
        - key: toggle_publish
          type: service
          label: "Publicar/Ocultar"
          icon: mdi-publish
          method: toggle_publish
          model_key: community_event
          groups: [staff_comunidad, core_group_superadmin]

- model: ui.view
  ext_id: community_events_view_registration_list
  fields:
    name: "Inscripciones - Lista"
    title:
      $fallback: "Gestión de Asistentes"
    model_key: registration
    type_id.ext_id: ui.ui_view_type_list
    definition:
      columns:
        - { field: id, label: ID, width: 70 }
        - { field: event_id, label: Evento }
        - { field: attendee_name, label: Asistente, sortable: true }
        - { field: attendee_email, label: Email }
        - { field: status, label: Estado, chip: true }
        - { field: registered_at, label: Registrado el }
        - { field: checkin_at, label: Check-in }
      
      actions:
        - { name: new, type: create, icon: mdi-plus, label: "Nueva Inscripción" }
        - { name: edit, type: update, icon: mdi-pencil, label: "Editar" }
        - { name: delete, type: delete, icon: mdi-delete, label: "Borrar" }
        
        - name: bulk_checkin
          type: service
          label: "Check-in Masivo"
          icon: mdi-account-check
          method: bulk_checkin
          bulk: true
          model_key: registration
          confirm:
            text: "¿Confirmar la entrada de todos los asistentes seleccionados?"

      row_actions:
        - key: confirm
          type: service
          label: "Confirmar"
          icon: mdi-check-circle
          method: confirm
          model_key: registration
          groups: [staff_comunidad]