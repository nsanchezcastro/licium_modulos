- model: ui.action
  ext_id: asset_action_loans
  fields:
    name: "Gestión de Préstamos"
    route: assets/loans
    model_key: asset_lending.loan
    menu: true
    default_multi_read_view_id.ext_id: asset_view_loan_list

- model: ui.menuitem
  ext_id: asset_menu_loans
  fields:
    title: "Préstamos"
    icon: mdi-hand-shake
    parent_id.ext_id: asset_menu_root
    action_id.ext_id: asset_action_loans