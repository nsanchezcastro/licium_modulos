    icon: mdi-devices
    color_primary: "#4CAF50"

- model: ui.action
  ext_id: asset_action_assets
  fields:
    name: "Gestión de Recursos"
    route: assets/inventory
    model_key: asset_lending.asset
    menu: true
    default_multi_read_view_id.ext_id: asset_view_asset_list

- model: ui.menuitem
  ext_id: asset_menu_inventory
